version: '3.8'

services:
  # 1. API Gateway (Dış Dünyaya Açık TEK Kapı)
  dispatcher-service:
    build: ./dispatcher-service
    container_name: dispatcher
    ports:
      - "8000:8000"  # Sadece bu port dışarıdan erişilebilir
    depends_on:
      - redis-auth
    networks:
      - yazlab_network

  # 2. Mikroservis (Dışa Kapalı, Sadece İç Ağda)
  user-service:
    build: ./user-service
    container_name: user-service
    expose:
      - "8001" # ports yerine expose kullanıyoruz ki dışarıdan erişilemesin (Ağ İzolasyonu)
    depends_on:
      - mongodb
    networks:
      - yazlab_network

  # 3. Veri Tabanları (Dışa Kapalı)
  redis-auth:
    image: redis:alpine
    container_name: redis-auth
    networks:
      - yazlab_network

  mongodb:
    image: mongo:latest
    container_name: mongodb
    networks:
      - yazlab_network

networks:
  yazlab_network:
    driver: bridge