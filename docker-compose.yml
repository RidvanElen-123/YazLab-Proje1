version: '3.8'

services:
  # 1. API Gateway (Dış Dünyaya Açık TEK Kapı)
  dispatcher-service:
    build: ./dispatcher-service
    container_name: dispatcher
    ports:
      - "8000:8000"
    depends_on:
      - redis-auth
    networks:
      - yazlab_network

  # 2. User Service (İç Ağda)
  user-service:
    build: ./user-service
    container_name: user-service
    expose:
      - "8001" 
    depends_on:
      - mongodb
    networks:
      - yazlab_network

  # 3. Post Service (İç Ağda - YENİ EKLENEN)
  post-service:
    build: ./post-service
    container_name: post-service
    expose:
      - "8002"
    depends_on:
      - mongodb
    networks:
      - yazlab_network

  # 4. Veri Tabanları (İç Ağda)
  redis-auth:
    image: redis:alpine
    container_name: redis-auth
    networks:
      - yazlab_network

  mongodb:
    image: mongo:latest
    container_name: mongodb
    networks:
      - yazlab_network

networks:
  yazlab_network:
    driver: bridge